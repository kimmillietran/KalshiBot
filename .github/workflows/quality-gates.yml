name: Quality Gates

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: quality-gates-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    name: Lint, build, and test
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      CI: "true"
      NODE_OPTIONS: "--max-old-space-size=4096"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check changed-file whitespace
        shell: bash
        run: |
          ZERO_SHA="0000000000000000000000000000000000000000"

          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            git diff --check "${BASE_SHA}...${HEAD_SHA}"
          elif [[ "${{ github.event.before }}" != "$ZERO_SHA" ]]; then
            git diff --check "${{ github.event.before }}..${{ github.sha }}"
          else
            git diff-tree --check --no-commit-id --root -r "${{ github.sha }}"
          fi

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test
